# PasteGuard Language Registry
# 24 spaCy languages with large models for accurate PII detection
#
# Usage: LANGUAGES=en,de docker compose build

spacy_version: "3.8.0"

# Phone context words per language (5-7 words each)
# Covers: phone/telephone, number, mobile, call
# Based on research of common usage and regional variants

languages:
  # Catalan
  ca:
    name: Catalan
    model: ca_core_news_lg
    phone_context: [telèfon, número, mòbil, trucada, trucar]

  # Chinese
  zh:
    name: Chinese
    model: zh_core_web_lg
    phone_context: [电话, 手机, 号码, 打电话, 电话号码, 手机号码]

  # Croatian
  hr:
    name: Croatian
    model: hr_core_news_lg
    phone_context: [telefon, broj, mobitel, poziv, nazovi, zvati]

  # Danish
  da:
    name: Danish
    model: da_core_news_lg
    phone_context: [telefon, nummer, mobil, mobiltelefon, opkald, ringe]

  # Dutch
  nl:
    name: Dutch
    model: nl_core_news_lg
    phone_context: [telefoon, nummer, mobiel, mobieltje, GSM, bellen]

  # English (Presidio defaults)
  en:
    name: English
    model: en_core_web_lg
    phone_context: [phone, number, telephone, cell, cellphone, mobile, call]

  # Finnish
  fi:
    name: Finnish
    model: fi_core_news_lg
    phone_context: [puhelin, numero, kännykkä, matkapuhelin, soittaa, puhelinnumero]

  # French
  fr:
    name: French
    model: fr_core_news_lg
    phone_context: [téléphone, numéro, portable, mobile, appeler, tél]

  # German
  de:
    name: German
    model: de_core_news_lg
    phone_context: [telefon, nummer, handy, mobiltelefon, anruf, rufnummer]

  # Greek
  el:
    name: Greek
    model: el_core_news_lg
    phone_context: [τηλέφωνο, αριθμός, κινητό, κλήση, τηλεφωνώ, καλώ]

  # Multilingual fallback (Explosion's xx_ent_wiki_sm) — handles any language
  # when no language-specific model is available. Labels: LOC, MISC, ORG, PER.
  # Use this for the primary Presidio instance when you want broad language
  # coverage with one model, and add specific languages (e.g. id) on a
  # secondary instance for higher accuracy.
  xx:
    name: Multilingual
    model: xx_ent_wiki_sm
    # When supported_languages includes 'xx', Presidio falls back to it for
    # any language that doesn't have its own model. This is configured in
    # analyzer-engine's NLP engine settings (see generate-configs.py).

  # Indonesian (custom spaCy NER model from HuggingFace)
  # nerdv2/nergrit Indonesian NER — 19 entity types, 95%+ token accuracy.
  # Built on Universal Dependencies Indonesian GSD + nergrit_corpus.
  # https://huggingface.co/nerdv2/id_nergrit_indonesian_spacy
  id:
    name: Indonesian
    model: id_nergrit_indonesian_spacy
    wheel_url: "https://huggingface.co/nerdv2/id_nergrit_indonesian_spacy/resolve/main/id_nergrit_indonesian_spacy-1.0.0-py3-none-any.whl"
    phone_context: [telepon, nomor, ponsel, seluler, telepon seluler, menelepon]

  # Italian
  it:
    name: Italian
    model: it_core_news_lg
    phone_context: [telefono, numero, cellulare, telefonino, chiamare, chiamata]

  # Japanese
  ja:
    name: Japanese
    model: ja_core_news_lg
    phone_context: [電話, 携帯, 番号, スマホ, ケータイ, 電話番号]

  # Korean
  ko:
    name: Korean
    model: ko_core_news_lg
    phone_context: [전화, 휴대폰, 핸드폰, 번호, 전화번호, 통화]

  # Lithuanian
  lt:
    name: Lithuanian
    model: lt_core_news_lg
    phone_context: [telefonas, numeris, mobilusis, skambutis, skambinti]

  # Macedonian
  mk:
    name: Macedonian
    model: mk_core_news_lg
    phone_context: [телефон, број, мобилен, повик, звони]

  # Norwegian Bokmål
  nb:
    name: Norwegian
    model: nb_core_news_lg
    phone_context: [telefon, nummer, mobil, mobiltelefon, samtale, ringe]

  # Polish
  pl:
    name: Polish
    model: pl_core_news_lg
    phone_context: [telefon, numer, komórka, komórkowy, dzwoń, zadzwoń]

  # Portuguese
  pt:
    name: Portuguese
    model: pt_core_news_lg
    phone_context: [telefone, número, celular, telemóvel, ligar, telefonar]

  # Romanian
  ro:
    name: Romanian
    model: ro_core_news_lg
    phone_context: [telefon, număr, mobil, apel, suna]

  # Russian
  ru:
    name: Russian
    model: ru_core_news_lg
    phone_context: [телефон, номер, мобильник, мобила, сотовый, звонок]

  # Slovenian
  sl:
    name: Slovenian
    model: sl_core_news_lg
    phone_context: [telefon, številka, mobilnik, mobilec, klic, pokliči]

  # Spanish
  es:
    name: Spanish
    model: es_core_news_lg
    phone_context: [teléfono, número, móvil, celular, llamar, llamada]

  # Swedish
  sv:
    name: Swedish
    model: sv_core_news_lg
    phone_context: [telefon, nummer, mobil, mobiltelefon, samtal, ringa]

  # Ukrainian
  uk:
    name: Ukrainian
    model: uk_core_news_lg
    phone_context: [телефон, номер, мобільний, мобілка, дзвінок, дзвони]

# =============================================================================
# Custom Recognizers (Presidio PatternRecognizer definitions)
# =============================================================================
# Add your own pattern-based recognizers here. Each entry becomes a Presidio
# PatternRecognizer with context-aware scoring:
#
#   name:        identifier (becomes Presidio entity type)
#   regex:       JavaScript/PCRE regex pattern (no anchors needed)
#   score:       base confidence (0.0-1.0, default 0.85)
#   context:     list of words that BOOST the score when found near the match
#                (e.g. [tv, model] for TV model numbers — Presidio uses this
#                to boost confidence when these context words appear nearby)
#   deny_list:   values to never match (e.g. common false-positive values)
#   languages:   optional list of language codes; defaults to all configured

custom_recognizers:
  # LG TV model numbers (e.g. 65QNED7EB6C, 55QNED80ABC, 75QNED70BSA)
  - name: TV_MODEL
    regex: '(\d{2,3})(?=qned|nu|mrgb)(?:qned|nu|mrgb)([a-z0-9]{2,4})([a-z0-9]{2,4})'
    score: 0.85
    context:
      - tv
      - model
      - panel
      - television
      - qned
      - oled
      - screen
      - unit
      - serial

  # LG part numbers (e.g. EAD00588145, EA0000123456)
  - name: PART_NUMBER
    regex: 'E?A[A-Z]?\d{8,12}'
    score: 0.7
    context:
      - part
      - ead
      - component
      - assembly
      - module
      - number
      - bom
    deny_list:
      - EAD00000000000

  # Indonesian phone numbers (e.g. +6281234567890, 081234567890)
  - name: ID_PHONE
    regex: '(?:\+62|62|0)8\d{8,11}'
    score: 0.8
    context:
      - phone
      - telpon
      - nomor
      - hp
      - whatsapp
      - wa
      - call
      - contact
      - mobile
