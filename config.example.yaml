# PasteGuard Configuration
# Copy this file to config.yaml and adjust the values

# Privacy mode: "mask" or "route"
#
# mask:  Masks PII before sending to provider, unmasks in response
# route: Routes PII requests to local LLM, non-PII to configured provider
mode: mask

# Server settings
server:
  port: 3000
  host: "0.0.0.0"
  # request_timeout: 600  # Seconds (0 = no timeout, default: 600)

# Providers - API endpoints
# Can be cloud (OpenAI, Anthropic, Azure) or self-hosted (vLLM, LiteLLM proxy, etc.).
# Codex CLI uses the ChatGPT-login backend below.
providers:
  # OpenAI-compatible endpoint (required)
  # The proxy forwards your client's Authorization header
  openai:
    base_url: https://api.openai.com/v1
    # api_key: ${OPENAI_API_KEY}  # Optional fallback if client doesn't send auth header

  # Anthropic endpoint (optional)
  # Enable to use /anthropic/v1/messages endpoint
  anthropic:
    base_url: https://api.anthropic.com
    # api_key: ${ANTHROPIC_API_KEY}  # Optional fallback if client doesn't send auth header

  # Codex ChatGPT-login endpoint
  # /codex/responses receives PII/secrets protection; support endpoints like /codex/models are proxied
  # The proxy forwards the Codex CLI Authorization header
  codex:
    base_url: https://chatgpt.com/backend-api/codex

# Local provider - only used when mode: route
# Supports: ollama (native), openai (for vLLM, LocalAI, LM Studio, etc.)
local:
  type: ollama
  base_url: http://localhost:11434
  model: llama3.2
  # api_key: ${LOCAL_API_KEY}  # Only needed for OpenAI-compatible servers

# Masking settings (only for mask mode)
masking:
  # Add visual markers to unmasked values in response (for debugging/demos)
  # Interferes with copy/paste, so disabled by default
  show_markers: false
  marker_text: "[protected]"

  # Text patterns that are never masked (protects against false positives)
  # whitelist:
  #   - "Company Name Inc."

  # Inject placeholder context into system prompt so the LLM understands placeholders.
  # Example: [[PERSON_1]] = initial "A", word length 4
  inject_placeholder_context: true

  # Custom system prompt template (optional).
  # Available variables per placeholder:
  #   {{placeholder}}    — e.g. [[PERSON_1]]
  #   {{initial}}        — first character, e.g. "A"
  #   {{word_length}}    — character count, e.g. 4
  #   {{type}}           — entity type, e.g. PERSON
  #   {{context_hint}}   — from placeholder_context_hints below
  #
  # Use {{placeholder_lines}} to place all placeholder entries in a custom layout:
  # system_prompt_template: |
  #   === CUSTOM HEADER ===
  #   These placeholders represent redacted values.
  #   {{placeholder_lines}}
  #
  # If not set, uses the default template:
  #   {{placeholder}} = initial "{{initial}}", word length {{word_length}}

  # Per-type hints to pass to the AI about what each placeholder represents.
  # These appear as {{context_hint}} in the template.
  #
  # Simple text hint:
  #   PERSON: "Indonesian full name"
  #
  # Substring selector — expose only part of the value, not the full name:
  #   mid:3   — middle 3 chars (e.g. "Raihan" → "hai")
  #   first:2 — first 2 chars   (e.g. "Raihan" → "Ra")
  #   last:2  — last 2 chars    (e.g. "Raihan" → "an")
  #
  # Template hint — combine text with extracted chars:
  #   PERSON: "Indonesian name, partial: {{value:mid:3}}"
  #
  # Examples:
  # placeholder_context_hints:
  #   PERSON: "mid:3"
  #   EMAIL_ADDRESS: "Indonesian work email, domain: {{value:mid:4}}"
  #   PHONE_NUMBER: "Indonesian mobile, prefix: {{value:first:3}}"
  #   LOCATION: "Indonesian city or region"

  # Extra context messages prepended to the placeholder context block.
  # Use this to tell the AI about your privacy policy, how to handle masked values, etc.
  # Each entry is a separate paragraph in the system prompt.
  # extra_context:
  #   - "Always refer to people by their role (e.g. 'the patient') instead of guessing from placeholder context."
  #   - "When writing code, never inline secrets — use environment variables."
  #   - "If you need to format a date or number, ask the user instead of inferring from the placeholder."

# PII Detection settings (Microsoft Presidio)
pii_detection:
  # Single Presidio URL (legacy, backward compatible)
  presidio_url: ${PRESIDIO_URL:-http://localhost:5002}

  # Multiple Presidio URLs for round-robin load balancing and failover.
  # Requests rotate across healthy instances automatically.
  # If presidio_urls is non-empty, it takes precedence over presidio_url.
  # presidio_urls:
  #   - http://presidio-1:5002
  #   - http://presidio-2:5002

  # Multi-language scan: send every text to ALL Presidio URLs in parallel,
  # using different languages per URL. Useful when one instance runs English
  # and another runs Indonesian — every text is checked in both languages.
  # When false (default): round-robin single URL with detected language.
  # multi_language_scan: true
  #
  # Per-instance language mapping (parallel array to presidio_urls).
  # presidio_url_languages: [en, id]

  # Supported languages for PII detection
  # Auto-detects language from input text and uses appropriate model
  #
  # Available (26 languages): ca, zh, hr, da, nl, en, fi, fr, de, el,
  #   id, it, ja, ko, lt, mk, xx, nb, pl, pt, ro, ru, sl, es, sv, uk
  #
  # Recommended setup for Indonesian + general coverage:
  #   primary instance (port 5002): languages: [xx]   → multilingual fallback
  #   secondary instance (port 5003): languages: [id] → Indonesian-specific model
  #   config.yaml: presidio_url_languages: [xx, id]
  #
  # Note: Indonesian (id) requires the id_nergrit_indonesian_spacy model.
  #       It is pre-installed in the PasteGuard Docker image. For manual setup:
  #       pip install https://huggingface.co/nerdv2/id_nergrit_indonesian_spacy/resolve/main/id_nergrit_indonesian_spacy-1.0.0-py3-none-any.whl
  #
  # Docker: Uses PASTEGUARD_LANGUAGES env var (auto-configured per image)
  # Local:  Uncomment the array below and comment out the env var line
  #languages: ${PASTEGUARD_LANGUAGES:-en}
  languages:
    - xx
  #   - de
  #   - fr
  #   - es
    - id

  # Fallback language if detected language is not in the list above
  fallback_language: en

  score_threshold: 0.7  # Minimum confidence score (0.0 - 1.0)

  # Entity types to detect
  # See: https://microsoft.github.io/presidio/supported_entities/
  entities:
    - PERSON
    - EMAIL_ADDRESS
    - PHONE_NUMBER
    - CREDIT_CARD
    - IBAN_CODE
    - IP_ADDRESS
    - LOCATION
    # - US_SSN
    # - US_PASSPORT
    # - CRYPTO
    # - NRP  # National Registration Number
    # - MEDICAL_LICENSE
    # - URL

  # Which message roles to scan for PII (optional)
  # By default, all roles are scanned. Set this to scan only user-controlled content:
  #   - user:      User messages (primary source of PII)
  #   - tool:      Tool/function call results (may contain user data)
  #   - function:  Legacy function results (OpenAI)
  # scan_roles:
  #   - user
  #   - tool
  #   - function

# Secrets Detection settings (Secrets Shield)
# Detects private keys, API keys, tokens and other secret credentials in requests
secrets_detection:
  # Enable secrets detection (default: true)
  enabled: true

  # Action to take when secrets are detected:
  #   mask:         Replace secrets with placeholders, unmask in response (default)
  #   block:        Block the request with HTTP 400
  #   route_local:  Route to local provider (only works in route mode)
  action: mask

  # Secret types to detect
  # Private Keys (enabled by default):
  #   - OPENSSH_PRIVATE_KEY: OpenSSH format (-----BEGIN OPENSSH PRIVATE KEY-----)
  #   - PEM_PRIVATE_KEY:     PEM formats (RSA, PRIVATE KEY, ENCRYPTED PRIVATE KEY)
  #
  # API Keys (opt-in):
  #   - API_KEY_SK:          Secret keys with sk- or sk_ prefix (OpenAI, Anthropic, Stripe, RevenueCat)
  #   - API_KEY_AWS:         AWS Access Keys (AKIA...)
  #   - API_KEY_GITHUB:      GitHub tokens (ghp_, gho_, ghu_, ghs_, ghr_)
  #
  # Tokens (opt-in):
  #   - JWT_TOKEN:           JSON Web Tokens (eyJ...)
  #   - BEARER_TOKEN:        Bearer tokens in Authorization-style contexts
  #
  # Environment Variables (opt-in):
  #   - ENV_PASSWORD:        DB_PASSWORD=..., ADMIN_PWD=... (8+ char values)
  #   - ENV_SECRET:          APP_SECRET=..., JWT_SECRET=... (8+ char values)
  #   - CONNECTION_STRING:   postgres://user:***@host, mongodb://...
  entities:
    - OPENSSH_PRIVATE_KEY
    - PEM_PRIVATE_KEY
    # Uncomment to detect API keys and tokens:
    # - API_KEY_SK
    # - API_KEY_AWS
    # - API_KEY_GITHUB
    # - JWT_TOKEN
    # - BEARER_TOKEN
    # - ENV_PASSWORD
    # - ENV_SECRET
    # - CONNECTION_STRING

  # Custom regex patterns (config-driven, no code changes needed)
  # Add any regex pattern to detect and mask. Matched spans are treated as secrets.
  # Placeholder format: [[NAME_N]] e.g. [[TV_MODEL_1]], [[PART_NUMBER_1]]
  #
  # custom_patterns:
  #   - name: TV_MODEL
  #     regex: "TV-[A-Z0-9]{4,8}"
  #   - name: PART_NUMBER
  #     regex: "PN-\\d{4,8}"
  #   - name: NIK_INDONESIA
  #     regex: "\\b\\d{16}\\b"
  #   - name: INDONESIAN_PHONE
  #     regex: "(?:\\+62|62|0)\\d{9,13}"
  custom_patterns: []

  # Maximum characters to scan per request (performance limit)
  # Set to 0 to scan entire request (full coverage, but slower for large payloads)
  max_scan_chars: 200000

  # Log detected secret types (never logs raw secret content)
  log_detected_types: true

  # Which message roles to scan for secrets (optional)
  # scan_roles:
  #   - user
  #   - tool
  #   - function

# Logging settings
logging:
  # SQLite database for request logs
  database: ./data/pasteguard.db

  # Log retention in days (0 = keep forever)
  retention_days: 30

  # Log masked content for dashboard preview (default: true)
  log_masked_content: true

# Dashboard settings
dashboard:
  enabled: true

  # Basic auth for dashboard (optional)
  # auth:
  #   username: admin
  #   password: ${DASHBOARD_PASSWORD}
